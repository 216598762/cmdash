# Manual-trigger CI pipeline for /root/cmdash.
#
# This workflow is fired only via `gh workflow run ci.yml` (workflow_dispatch).
# It was authored in response to the user's request to verify the 3 newly-un-
# ignored kitty tests (`pty_kitty_load_emits_event_via_vte_hook`,
# `pty_kitty_split_chunk_across_advances`,
# `pty_kitty_place_command_emits_event`) on a real CI image after they were
# un-`#[ignore]`'d in atom `eea5878` (forward-fixup atop `f158ea0`). The
# user explicitly authorized this addition via `ask_user` (Option A:
# "Author + ship a new ci.yml + dispatch") as a forward-fixup atom atop
# `ecfa1f2`.
#
# Pipeline shape (mirrors the local 5-gate discipline + a 100-iter soak):
#
#   1. `cargo fmt --all -- --check`
#   2. `cargo build -p cmdash-pty --tests`
#   3. `cargo test -p cmdash-pty --quiet` (13 plain `#[test]` + 1 ignored
#      cat-echo test from atom `ecfa1f2`'s revert; the SET under test is
#      `cmdash-pty` so this is the canonical per-crate gate)
#   4. **100-iteration SOAK** on the 3 newly-un-ignored kitty tests —
#      `set -euo pipefail` + grep for `test result: FAILED` + `exit 1`
#      on first flake + `::error::` annotation so the failure shape
#      propagates into the GH UI for verbatim forward-fixup reason-text.
#   5. `cargo clippy --workspace --all-targets -- -D warnings` — must
#      show ONLY the 3 known residuals from `5e27556` (no new clippy
#      regressions from `cmdash-pty`'s `unsafe` blocks in
#      `PanePty::enable_pty_echo`).
#   6. `cargo doc --no-deps --workspace` (the pre-existing latent
#      unresolved-link warnings are not gate-failing).
#
# Local 30/30 baseline (3 tests × 10 iterations) from the prior turn pins
# per-test stability on this Arch Linux PTY-alloc host. The 100-iter
# step is the right shape for real-CI confirmation because portable_pty
# 0.9's `openpty` is the most likely flake vector; the soak isolates that
# risk from the rest of the pipeline.
#
# Non-trigger notes:
# - `push`/`pull_request` triggers are deliberately NOT wired: the user's
#   forward-only chain discipline prefers `workflow_dispatch` explicit
#   trigger for CI surface-area decisions. Future iterations add push
#   triggers once the manual shape stabilizes.
# - `concurrency.cancel-in-progress: false` to preserve in-flight CI
#   records when the user re-dispatches mid-run (no surprise cancellations).
# - `CARGO_TERM_COLOR: always` for legible test output in the GH log.

name: ci

# IMPORTANT: the `on:` key is quoted as `"on":` to escape the YAML 1.1
# boolean-coercion trap. Bare `on:` parses as `true:` under YAML 1.1
# (Go yaml.v3's default which GitHub's Actions parser inherits) and
# GH Actions' downstream trigger-detector then does not find any
# `workflow_dispatch` trigger — leading to HTTP 422 on `gh workflow
# run` AND a parallel ghost `event=push` run with `jobs=[]` that
# surfaces as `conclusion: failure` for the actual `git push` itself.
# The combined `"on": [workflow_dispatch]` form (quoted key +
# inline flow-sequence value) is the most-robust shape across the
# parser versions users have reported in the wild.
"on": [workflow_dispatch]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    env:
      CARGO_TERM_COLOR: always
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Install Rust 1.96.0 (matches local toolchain; pinned tag avoids drifting onto a future 1.96.x)
        uses: dtolnay/rust-toolchain@1.96.0
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and target dir
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt --all -- --check
        run: cargo fmt --all -- --check

      - name: cargo build -p cmdash-pty --tests
        run: cargo build -p cmdash-pty --tests

      - name: cargo test -p cmdash-pty --quiet
        run: cargo test -p cmdash-pty --quiet

      # 100-iteration SOAK on the 3 newly-un-ignored kitty tests so a
      # real-CI flake (PTY-alloc race, /bin/cat stdout poll stall,
      # parse_kitty_chunk edge case on ubuntu-latest) surfaces verbatim
      # for the forward-fixup `#[ignore]` reason text below.
      # Local baseline: 30/30 green from the prior turn on this PTY-alloc
      # host. The 300-run sweep here is the real-CI confirmation.
      - name: 100-iter SOAK: 3 newly-un-ignored kitty tests
        run: |
          set -euo pipefail
          PASS=0
          # NOTE: this step intentionally runs WITHOUT --quiet so the
          # full cargo test assertion shape (panic + `left` / `right`
          # comparisons) lands verbatim in $OUT for the FAIL path's
          # `tail -40` capture. The prior `c92da3b` atom used --quiet
          # and compressed the failure context below the level needed
          # for a precise `#[ignore = "..."]` reason-text flip on a
          # forward-fixup atom.
          for n in $(seq 1 100); do
            for T in pty_kitty_load_emits_event_via_vte_hook \
                     pty_kitty_split_chunk_across_advances \
                     pty_kitty_place_command_emits_event; do
              OUT=$(cargo test -p cmdash-pty --test round_trip -- "$T" 2>&1) || true
              if echo "$OUT" | grep -q 'test result: ok'; then
                PASS=$((PASS+1))
              elif echo "$OUT" | grep -q 'test result: FAILED'; then
                {
                  echo "::error::CI FLAKE: iter=$n test=$T (assertion failure)"
                  echo "::error::--- failing-output-begin ---"
                  echo "$OUT" | tail -60
                  echo "::error::--- failing-output-end ---"
                  echo "::error::Forward-fixup reason text: see commit body."
                } | tee /tmp/cmdash-soak-failures.log
                exit 1
              else
                # cargo test produced neither `test result: ok` nor
                # `test result: FAILED` — could be runner OOM kill,
                # SIGSEGV, infra harness timeout, stdin EOF before
                # runner starts. Preserve the user's forward-fixup
                # fidelity by treating this as a flake too instead
                # of silently incrementing iter (which would let
                # PASS=300 vouch for a partial-soak).
                {
                  echo "::error::CI FLAKE: iter=$n test=$T (cargo test produced neither ok nor FAILED — infra-class kill possible)"
                  echo "::error::--- unexpected-output-begin ---"
                  echo "$OUT" | tail -60
                  echo "::error::--- unexpected-output-end ---"
                  echo "::error::Forward-fixup reason text: see infra-class flake shape and commit body."
                } | tee /tmp/cmdash-soak-failures.log
                exit 1
              fi
            done
            [ $((n % 10)) -eq 0 ] && echo "SOAK progress: iter=$n PASS=$PASS"
          done
          echo "SOAK 100 iter x 3 tests = 300 runs: PASS=$PASS"

      # Upload the SOAK fail-path $OUT (written by the SOAK step on
      # any failure branch via `tee /tmp/cmdash-soak-failures.log`)
      # as a GH artifact so post-mortem has the FULL output rather
      # than only the inline `::error::` annotations' tail -60.
      # Gated by `if: failure()` so green runs pay zero cost.
      - name: Upload SOAK fail-path $OUT (post-mortem)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ci-soak-failure-logs
          path: /tmp/cmdash-soak-failures.log
          if-no-files-found: warn

      - name: cargo clippy --workspace --all-targets -- -D warnings
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo doc --no-deps --workspace
        run: cargo doc --no-deps --workspace
