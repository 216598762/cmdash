[package]
name = "cmdash"
description = "cmdash binary: event loop and crate glue. All graphics output routes through dashcompositor."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
authors.workspace = true
repository.workspace = true

[dependencies]
cmdash-config = { version = "0.1.0", path = "../cmdash-config" }
cmdash-keybinds = { version = "0.1.0", path = "../cmdash-keybinds" }
cmdash-layout = { version = "0.1.0", path = "../cmdash-layout" }
cmdash-pty = { version = "0.1.0", path = "../cmdash-pty" }
crossterm = "0.29.0"
dashcompositor.workspace = true
ratatui = { version = "0.25", features = ["crossterm"] }
thiserror = "2.0.18"
tracing = "0.1.44"
tracing-subscriber = { version = "0.3.23", features = ["env-filter"] }

[[bin]]
name = "cmdash"
path = "src/main.rs"
